<script>
function levenshtein(s, t) {
    if (!s.length) return t.length;
    if (!t.length) return s.length;

    return Math.min(
        levenshtein(s.substr(1), t) + 1,
        levenshtein(t.substr(1), s) + 1,
        levenshtein(s.substr(1), t.substr(1)) + (s[0] !== t[0] ? 1 : 0)
    ) + 1;
}
String.prototype.levenstein = function(string) {
    var a = this, b = string + "", m = [], i, j, min = Math.min;

    if (!(a && b)) return (b || a).length;

    for (i = 0; i <= b.length; m[i] = [i++]);
    for (j = 0; j <= a.length; m[0][j] = j++);

    for (i = 1; i <= b.length; i++) {
        for (j = 1; j <= a.length; j++) {
            m[i][j] = b.charAt(i - 1) == a.charAt(j - 1)
                ? m[i - 1][j - 1]
                : m[i][j] = min(
                    m[i - 1][j - 1] + 1,
                    min(m[i][j - 1] + 1, m[i - 1][j] + 1))
        }
    }
    return m[b.length][a.length];
}
function longest(arr) {
	return arr.reduce(function(a, b) {
		return a.length > b.length ? a : b;
	}).length
}

var trie = new Trie(), i;
for(i = 0; i < words.length; i++) {
	trie.add({
	    key: words[i],
	    value: {name: words[i]},
	    score: i//words.length - i
	});
}

function getPrefixes(input) {
	let result = []
	for(let j = 1; j < input.length-1; j++) {
		result.push([input.slice(0, j+1), trie.prefixSearch(input.slice(0, j+1), {unique: true}).length])
	}
	result = result.filter(x => x[1] === 1)
	return result/*.reverse()*/.map(x => x.join(":")).join(",")
}








input = "", results = [], pad = 0
$("input").keyup(function() {
	input = $(this).val()
	if (input.length < 2) {
		$("div").html("")
		return
	}
	results = trie.prefixSearch(input, {unique: true/*, limit: 1*/})
	if (results.length === 0) {
		$("div").html("")
		return
	}
	let info = '', nouns, verbs
	pad = longest(results.map(x => x.name))+1
	results = results.map(x => [x.name.padEnd(pad), x.score, getPrefixes(x.name)])//.filter(x => x[2].length)
	$("div").html(results.map(x => x.join("\t")).join("\n"))
}).keyup()
